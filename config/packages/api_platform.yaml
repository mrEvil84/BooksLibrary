api_platform:
    title: BooksLibrary
    mapping:
        paths:
            - '%kernel.project_dir%/src/Api/'
    version: 1.0.0
    formats:
        json: ['application/json']
        jsonld: ['application/ld+json']
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Origin']
        error_formats:
            json: [ 'application/json' ]
        enable_swagger_ui: true
