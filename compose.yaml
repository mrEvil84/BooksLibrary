services:
  php:
    build: ./docker/php
    container_name: php84
    working_dir: /var/www
    volumes:
      - ./public:/var/www/html
      - ./:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  composer:
    image: composer
    volumes:
      - .:/var/www
    command: install
  db:
    image: postgres:${DB_VERSION:-10.1}
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./docker/conf/postgres/:/docker-entrypoint-initdb.d/
  db_test:
    image: postgres:${TEST_DB_VERSION:-10.1}
    restart: always
    environment:
      - POSTGRES_DB=${TEST_DB_NAME}
      - POSTGRES_USER=${TEST_DB_USER}
      - POSTGRES_PASSWORD=${TEST_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./docker/conf/postgres/:/docker-entrypoint-initdb.d/
